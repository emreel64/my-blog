<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blog</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem("personal-blog-theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<style>
  :root, :root[data-theme="light"] {
    --bg: #F3EFE3;
    --paper: #FFFFFF;
    --ink: #212B33;
    --ink-soft: #57616B;
    --ink-faint: #8A8F86;
    --accent: #2F5FA3;
    --line: #E2DCC9;
    --shadow: rgba(33, 43, 51, 0.08);
    --header-bg: #21262C;
    --header-ink: #F3EFE3;
    --header-ink-soft: rgba(243, 239, 227, 0.6);
  }

  :root[data-theme="dark"] {
    --bg: #12161C;
    --paper: #1A2029;
    --ink: #EFEAdd;
    --ink-soft: #ADB4BE;
    --ink-faint: #6E7580;
    --accent: #7CACDE;
    --line: #2B323D;
    --shadow: rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .serif {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
  }

  .site-header {
    background: var(--header-bg);
    position: relative;
    padding: 2.5rem 1.5rem;
  }

  .site-header-inner {
    max-width: 640px;
    margin: 0 auto;
    padding-right: 96px;
  }

  #wordmark {
    margin: 0;
    font-size: 2.35rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    text-wrap: balance;
    line-height: 1.15;
    color: var(--header-ink);
  }

  .site-sub {
    margin: 0.5rem 0 0;
    color: var(--header-ink-soft);
    font-size: 0.9rem;
    letter-spacing: 0.03em;
  }

  .avatar-badge {
    position: absolute;
    top: 50%;
    right: 1.5rem;
    transform: translateY(-50%);
    width: 76px;
    height: auto;
    filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.45));
    pointer-events: none;
    user-select: none;
  }

  @media (max-width: 560px) {
    .site-header-inner { padding-right: 66px; }
    .avatar-badge { width: 52px; right: 1rem; }
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 6rem;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
    min-height: 24px;
  }

  .entry-count {
    font-size: 0.82rem;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }

  .theme-switch { display: flex; align-items: center; gap: 0.5rem; }
  .theme-switch-label { font-size: 0.78rem; color: var(--ink-faint); letter-spacing: 0.02em; min-width: 2.6em; }

  .toggle-track {
    appearance: none; -webkit-appearance: none;
    background: var(--line); width: 44px; height: 24px; border-radius: 999px;
    position: relative; border: none; cursor: pointer; padding: 0; flex-shrink: 0;
    transition: background 0.15s ease;
  }
  .toggle-knob {
    position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
    border-radius: 50%; background: var(--accent); transition: left 0.18s ease;
  }
  :root[data-theme="dark"] .toggle-knob { left: 22px; }

  button:focus-visible, .toggle-track:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  .entries { display: flex; flex-direction: column; }

  .entry { padding: 1.9rem 0; border-top: 1px solid var(--line); }

  .entry-meta { margin-bottom: 0.5rem; }

  .entry-date {
    font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums;
  }

  .entry-title {
    margin: 0 0 0.6rem;
    font-size: 1.4rem; font-weight: 400; line-height: 1.3; text-wrap: balance;
  }

  .canvas-preview {
    position: relative; width: 100%; max-width: 100%;
    aspect-ratio: 4 / 3; background: var(--paper);
    border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
  }

  .el { position: absolute; }

  .el-text-body {
    width: 100%; height: 100%; white-space: pre-wrap; overflow: hidden;
    line-height: 1.4; color: var(--ink);
  }

  .el-image-body { width: 100%; height: 100%; object-fit: contain; display: block; }

  .empty-state { border-top: 1px solid var(--line); padding: 3.5rem 0.25rem; text-align: center; }
  .empty-state p { color: var(--ink-faint); font-size: 0.95rem; margin: 0; }

  .load-msg { padding: 3rem 0.25rem; text-align: center; color: var(--ink-faint); font-size: 0.9rem; }

  @media (prefers-reduced-motion: reduce) {
    .toggle-track, .toggle-knob { transition: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <h1 id="wordmark" class="serif">Blog</h1>
    <p class="site-sub" id="siteSub">a personal blog, kept here</p>
  </div>
  <img class="avatar-badge" src="avatar.png" alt="" />
</header>

<div class="page">
  <div class="topbar">
    <span class="entry-count" id="entryCount"></span>
    <div class="theme-switch">
      <span class="theme-switch-label" id="themeLabel">Light</span>
      <button class="toggle-track" id="themeToggle" type="button" role="switch" aria-checked="false" aria-label="Toggle dark mode">
        <span class="toggle-knob"></span>
      </button>
    </div>
  </div>

  <main class="entries" id="entries">
    <div class="load-msg">Loading…</div>
  </main>
</div>

<script>
(function () {
  var THEME_KEY = "personal-blog-theme";

  var FONT_STACKS = {
    serif: 'Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif',
    sans: '-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
    mono: '"SF Mono", Menlo, Consolas, monospace',
    round: '"Avenir Next", "Century Gothic", ui-rounded, sans-serif'
  };

  var entriesEl = document.getElementById("entries");
  var countEl = document.getElementById("entryCount");
  var wordmarkEl = document.getElementById("wordmark");
  var siteSubEl = document.getElementById("siteSub");
  var themeToggle = document.getElementById("themeToggle");
  var themeLabel = document.getElementById("themeLabel");

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    themeLabel.textContent = theme === "dark" ? "Dark" : "Light";
    themeToggle.setAttribute("aria-checked", theme === "dark" ? "true" : "false");
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
  }
  themeToggle.addEventListener("click", function () {
    var current = document.documentElement.getAttribute("data-theme") || "light";
    applyTheme(current === "dark" ? "light" : "dark");
  });
  applyTheme(document.documentElement.getAttribute("data-theme") || "light");

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  var resizeObserver = new ResizeObserver(function (obs) {
    obs.forEach(function (entry) { applyFontSizes(entry.target); });
  });

  function applyFontSizes(canvasNode) {
    var width = canvasNode.getBoundingClientRect().width;
    if (!width) return;
    canvasNode.querySelectorAll(".el-text").forEach(function (el) {
      var scale = parseFloat(el.dataset.fontScale || "34");
      var body = el.querySelector(".el-text-body");
      if (body) body.style.fontSize = Math.max(8, width * (scale / 1000)) + "px";
    });
  }

  function buildElementNode(elData) {
    var wrap = document.createElement("div");
    wrap.className = "el " + (elData.type === "text" ? "el-text" : "el-image");
    wrap.style.left = elData.x + "%";
    wrap.style.top = elData.y + "%";
    wrap.style.width = elData.w + "%";
    wrap.style.height = elData.h + "%";

    if (elData.type === "text") {
      var body = document.createElement("div");
      body.className = "el-text-body serif";
      body.style.fontFamily = FONT_STACKS[elData.fontFamily] || FONT_STACKS.serif;
      wrap.dataset.fontScale = elData.fontScale || 34;
      if (elData.html !== undefined) body.innerHTML = elData.html;
      else body.textContent = elData.text || "";
      wrap.appendChild(body);
    } else {
      var img = document.createElement("img");
      img.className = "el-image-body";
      img.src = elData.src;
      img.alt = "";
      wrap.appendChild(img);
    }
    return wrap;
  }

  function renderFeed(posts) {
    entriesEl.innerHTML = "";
    countEl.textContent = posts.length
      ? posts.length + (posts.length === 1 ? " entry" : " entries") : "";

    if (posts.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.innerHTML = "<p>No entries yet — check back soon.</p>";
      entriesEl.appendChild(empty);
      return;
    }

    posts.forEach(function (entry) {
      var el = document.createElement("article");
      el.className = "entry";

      var meta = document.createElement("div");
      meta.className = "entry-meta";
      meta.innerHTML = '<span class="entry-date"></span>';
      meta.querySelector(".entry-date").textContent = formatDate(entry.ts);
      el.appendChild(meta);

      var h2 = document.createElement("h2");
      h2.className = "entry-title";
      h2.style.fontFamily = FONT_STACKS[entry.titleFontFamily] || FONT_STACKS.serif;
      if (entry.titleFontSize) h2.style.fontSize = entry.titleFontSize + "px";
      h2.textContent = entry.title || "Untitled";
      el.appendChild(h2);

      if (entry.elements && entry.elements.length) {
        var preview = document.createElement("div");
        preview.className = "canvas-preview";
        if (entry.contentW && entry.contentH) {
          preview.style.aspectRatio = entry.contentW + " / " + entry.contentH;
        }
        entry.elements.forEach(function (elData) {
          preview.appendChild(buildElementNode(elData));
        });
        el.appendChild(preview);
        resizeObserver.observe(preview);
        requestAnimationFrame(function () { applyFontSizes(preview); });
      }

      entriesEl.appendChild(el);
    });
  }

  fetch("posts.json?t=" + Date.now())
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (data) {
      if (data.title) { document.title = data.title; wordmarkEl.textContent = data.title; }
      if (data.tagline !== undefined) siteSubEl.textContent = data.tagline;
      renderFeed(Array.isArray(data.posts) ? data.posts : []);
    })
    .catch(function (err) {
      entriesEl.innerHTML = '<div class="load-msg">Could not load posts.<br><small>' +
        String(err.message || err) + "</small></div>";
    });
})();
</script>
</body>
</html>
